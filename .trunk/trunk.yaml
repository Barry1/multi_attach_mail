      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - sourcery@1.43.0
    - actionlint@1.7.10
    - markdownlint@0.47.0
    - bandit@1.9.3
    - checkov@3.2.497
    - osv-scanner@2.3.0
    - trivy@0.68.2
    - trufflehog@3.92.4
    - black@26.1.0
    - git-diff-check
    - gitleaks@8.30.0
    - isort@7.0.0
    - prettier@3.8.0
    - ruff@0.14.13
    - taplo@0.10.0
    - yamllint@1.38.0
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.12.2
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
